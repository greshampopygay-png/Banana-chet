<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Banana Empire: xeoni7 Official</title>
    <style>
        :root { --yellow: #f1c40f; --purple: #9b59b6; --green: #2ecc71; --dark: #0f0f0f; --card: rgba(255,255,255,0.06); }
        body { text-align:center; font-family:'Segoe UI',sans-serif; background:var(--dark); color:white; margin:0; padding:15px; user-select:none; touch-action:manipulation; overflow-x:hidden; }
        .stats-box { background:var(--card); padding:20px; border-radius:25px; margin-bottom:20px; border:1px solid rgba(255,255,255,0.1); position:relative; }
        .score-val { font-size:52px; color:var(--yellow); font-weight:900; display:block; word-break:break-all; line-height:1.1; }
        .sub-stats { font-size:13px; color:#888; margin-top:5px; }
        .vip-badge { color:var(--purple); font-weight:bold; font-size:14px; display:none; margin-bottom:5px; }
        #game-area { height:220px; display:flex; align-items:center; justify-content:center; position:relative; }
        #banana { width:170px; height:170px; cursor:pointer; transition:transform 0.1s; z-index:5; object-fit:contain; }
        #banana:active { transform:scale(0.85) !important; }
        .btn { width:100%; max-width:340px; padding:18px; border:none; border-radius:20px; font-weight:800; cursor:pointer; margin-bottom:12px; font-size:15px; transition:0.3s; display:block; }
        .btn-don { background:linear-gradient(45deg,#8e44ad,#9b59b6); color:white; box-shadow:0 4px 15px rgba(155,89,182,0.4); }
        .btn-ads { background:#ff4757; color:white; }
        .btn-play { background:linear-gradient(45deg,#f1c40f,#f39c12); color:white; box-shadow:0 4px 15px rgba(241,196,15,0.4); }
        .btn-more { background:#00F5FF; color:white; box-shadow:0 4px 15px rgba(0,245,255,0.4); }
        .btn-cheat { background:linear-gradient(45deg,#2ecc71,#27ae60); color:white; box-shadow:0 4px 15px rgba(46,204,113,0.4); }
        .title { text-align:left; padding:10px 0 10px 10px; font-size:14px; color:#555; text-transform:uppercase; letter-spacing:1px; }
        .upg-card { background:var(--card); margin-bottom:10px; padding:15px; border-radius:20px; display:flex; justify-content:space-between; align-items:center; }
        .upg-name { text-align:left; }
        .upg-name b { display:block; font-size:17px; }
        .upg-name i { font-size:12px; color:var(--green); font-style:normal; font-weight:bold; }
        .buy-btn { background:#252525; color:white; border:1px solid #444; padding:12px 20px; border-radius:15px; font-weight:bold; cursor:pointer; }
        .skin-tabs { display:flex; gap:8px; margin-bottom:12px; overflow-x:auto; padding-bottom:4px; scrollbar-width:none; }
        .skin-tabs::-webkit-scrollbar { display:none; }
        .skin-tab { padding:8px 16px; border-radius:30px; border:none; font-weight:700; font-size:12px; cursor:pointer; white-space:nowrap; background:#1a1a1a; color:#888; }
        .skin-tab.active { color:#0f0f0f; }
        .skin-tab[data-cat="all"].active { background:#f1c40f; }
        .skin-tab[data-cat="common"].active { background:#aaa; }
        .skin-tab[data-cat="rare"].active { background:#4fc3f7; }
        .skin-tab[data-cat="epic"].active { background:#ab47bc; }
        .skin-tab[data-cat="legendary"].active { background:linear-gradient(90deg,#f1c40f,#e67e22,#e74c3c); color:white; }
        .skin-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-top:5px; padding-bottom:40px; }
        .skin-item { background:var(--card); padding:12px; border-radius:20px; border:2px solid transparent; cursor:pointer; transition:0.2s; }
        .skin-item.active { border-color:var(--yellow); background:rgba(241,196,15,0.1); }
        .skin-img { width:50px; height:50px; margin-bottom:5px; object-fit:contain; }
        .skin-price { font-size:10px; color:#aaa; font-weight:bold; }
        .skin-label { font-size:12px; color:#ddd; font-weight:600; margin-bottom:3px; }
        .skin-rarity { font-size:9px; margin-bottom:4px; }
        .skin-rarity.common { color:#aaa; }
        .skin-rarity.rare { color:#4fc3f7; }
        .skin-rarity.epic { color:#ab47bc; }
        .skin-rarity.legendary { background:linear-gradient(90deg,#f1c40f,#e67e22); -webkit-background-clip:text; -webkit-text-fill-color:transparent; font-weight:800; }
        .skin-classic   { filter: none; }
        .skin-big       { transform: scale(1.45); filter: none; }
        .skin-small     { transform: scale(0.6); filter: none; }
        .skin-rainbow   { animation: aRainbow 2.5s infinite linear; }
        .skin-fire      { animation: aFire 1s infinite alternate; }
        .skin-cosmos    { animation: aCosmos 2s infinite alternate; }
        .skin-diamond   { animation: aDiamond 1.8s infinite alternate; }
        .skin-shadow    { filter: grayscale(1) brightness(0.05); animation: aShadow 3s infinite alternate; }
        .skin-cherry    { animation: aCherry 1.5s infinite alternate; }
        .skin-pen       { animation: aPen 2s infinite linear; }
        .skin-sunrise   { animation: aSunrise 3s infinite linear; }
        .skin-cyber     { animation: aCyber 2s infinite alternate; }
        .skin-disco     { animation: aDisc 3s infinite linear; }
        .skin-magma     { animation: aMagma 2s infinite alternate; }
        @keyframes aRainbow { 0%{filter:hue-rotate(0deg) saturate(3)} 100%{filter:hue-rotate(360deg) saturate(3)} }
        @keyframes aFire    { 0%{filter:drop-shadow(0 0 8px #e67e22)} 100%{filter:drop-shadow(0 0 22px #ff4500)} }
        @keyframes aCosmos  { 0%{filter:drop-shadow(0 0 10px #6c3483)} 100%{filter:drop-shadow(0 0 28px #a569bd)} }
        @keyframes aDiamond { 0%{filter:brightness(1.8) drop-shadow(0 0 10px #85c1e9)} 100%{filter:brightness(2.6) drop-shadow(0 0 28px #aed6f1)} }
        @keyframes aShadow  { 0%{filter:grayscale(1) brightness(0.05)} 100%{filter:grayscale(1) brightness(0.15) drop-shadow(0 0 22px #333)} }
        @keyframes aCherry  { 0%{filter:drop-shadow(0 0 8px #922b21)} 100%{filter:drop-shadow(0 0 22px #e74c3c)} }
        @keyframes aPen     { 0%{transform:rotate(0deg)} 25%{transform:rotate(-8deg)} 75%{transform:rotate(8deg)} 100%{transform:rotate(0deg)} }
        @keyframes aSunrise { 0%{filter:drop-shadow(0 0 10px #e67e22)} 50%{filter:drop-shadow(0 0 20px #f39c12)} 100%{filter:drop-shadow(0 0 10px #e67e22)} }
        @keyframes aCyber { 0%{filter:drop-shadow(0 0 8px #ff00ff) hue-rotate(0deg)} 100%{filter:drop-shadow(0 0 18px #00ffcc) hue-rotate(90deg)} }
        @keyframes aDisc  { 0%{filter:hue-rotate(0deg) brightness(0.4) saturate(3)} 100%{filter:hue-rotate(360deg) brightness(0.6) saturate(4)} }
        @keyframes aMagma { 0%{filter:hue-rotate(280deg) saturate(4) brightness(1.1) drop-shadow(0 0 8px #ff69b4)} 100%{filter:hue-rotate(180deg) saturate(4) brightness(1.2) drop-shadow(0 0 18px #00bfff)} }
        .float { position:fixed; color:var(--yellow); font-weight:bold; font-size:28px; pointer-events:none; animation:floatUp 0.8s forwards; z-index:999; }
        @keyframes floatUp { 0%{transform:translateY(0);opacity:1} 100%{transform:translateY(-120px);opacity:0} }

        /* --- CHEAT PANEL --- */
        #cheat-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:2000; align-items:center; justify-content:center; }
        #cheat-panel { background:#161616; border:2px solid #2ecc71; border-radius:20px; padding:20px; width:88%; max-width:360px; text-align:left; max-height:80vh; overflow-y:auto; }
        #cheat-panel h3 { margin:0 0 12px 0; color:#2ecc71; text-align:center; }

        #cheat-panel input { flex:1; padding:10px; border-radius:10px; border:1px solid #333; background:#0f0f0f; color:white; font-size:14px; }
        #cheat-panel button.cbtn { padding:10px 14px; border:none; border-radius:10px; background:#2ecc71; color:#0f0f0f; font-weight:800; cursor:pointer; }
        #cheat-panel button.cbtn-alt { background:#333; color:white; width:100%; padding:12px; border-radius:12px; border:none; font-weight:700; margin-bottom:8px; cursor:pointer; }
        #cheat-panel button.cbtn-danger { background:#e74c3c; }
        #cheat-close { position:absolute; top:10px; right:16px; font-size:22px; color:#888; cursor:pointer; background:none; border:none; }
    </style>
</head>

if (localStorage.getItem("x_ver") !== GAME_VERSION) {
    localStorage.clear();
    localStorage.setItem("x_ver", GAME_VERSION);
}

var _savedOwned = [0];
try { var _raw = localStorage.getItem("x_own"); if(_raw) _savedOwned = JSON.parse(_raw); } catch(e) { _savedOwned = [0]; }
var _savedActive = parseInt(localStorage.getItem("x_act")) || 0;
if (isNaN(_savedActive) || _savedActive < 0 || _savedActive >= skinList.length) _savedActive = 0;
_savedOwned = _savedOwned.filter(function(i){ return typeof i === "number" && i >= 0 && i < skinList.length; });
if (_savedOwned.length === 0) _savedOwned = [0];

var game = {
    score:      parseFloat(localStorage.getItem("x_sc"))  || 0,
    clickPower: parseInt(localStorage.getItem("x_cp"))    || 1,
    autoPower:  parseInt(localStorage.getItem("x_ap"))    || 0,
    clickCost:  parseInt(localStorage.getItem("x_cc"))    || 15,
    autoCost:   parseInt(localStorage.getItem("x_ac"))    || 50,
    isVip:      localStorage.getItem("x_vip") === "true",
    ownedSkins: _savedOwned,
    activeSkin: _savedActive
};

function skinImg(s) { return s.img ? s.img : DEFAULT_IMG; }

function filterSkins(cat, btn) {
    currentFilter = cat;
    var tabs = document.querySelectorAll(".skin-tab");
    for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove("active");
    btn.classList.add("active");
    renderSkins();
}

function saveGame() {
    localStorage.setItem("x_sc",  game.score);
    localStorage.setItem("x_cp",  game.clickPower);
    localStorage.setItem("x_ap",  game.autoPower);
    localStorage.setItem("x_cc",  game.clickCost);
    localStorage.setItem("x_ac",  game.autoCost);
    localStorage.setItem("x_vip", game.isVip);
    localStorage.setItem("x_own", JSON.stringify(game.ownedSkins));
    localStorage.setItem("x_act", game.activeSkin);
}

function handleBananaClick(e) {
    var p = game.isVip ? game.clickPower * 2 : game.clickPower;
    game.score += p;
    var f = document.createElement("div");
    f.className = "float";
    f.innerText = "+" + p;
    f.style.left = e.clientX + "px";
    f.style.top  = e.clientY + "px";
    document.body.appendChild(f);
    setTimeout(function(){ f.remove(); }, 800);
    updateUI();
}

function buyUpgrade(type) {
    if (type === "click" && game.score >= game.clickCost) {
        game.score -= game.clickCost;
        game.clickPower++;
        game.clickCost = Math.round(game.clickCost * 1.6);
    } else if (type === "auto" && game.score >= game.autoCost) {
        game.score -= game.autoCost;
        game.autoPower++;
        game.autoCost = Math.round(game.autoCost * 1.7);
    }
    updateUI();
}
